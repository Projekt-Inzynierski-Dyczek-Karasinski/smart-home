preset_values:
  tcp_server_thread_count:
    half_cpu_cores: &half_cpu_cores -1
    all_cpu_cores: &all_cpu_cores 0


core:
  mode: "headless"  #TODO add kiosk gui
  log_level: "debug" #TODO implement verbose levels
  ipc:
    tcp_server:
      enabled: true
      address: "127.0.0.1"
      port: 43321
      threads: *half_cpu_cores # Exact thread count if value > 0, possible preset values: *all_cpu_cores, *half_cpu_cores

services:
  mediator:
    enabled: false
    config_path: "../../configs/mediator.yaml" #TODO change path to global install

