; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

; TODO !pr comment DDISABLE_WAKE_UP_RF_NOTIFICATION=1

[env:esp32dev]
platform = espressif32
board = esp32dev
upload_speed = 921600
monitor_speed = 115200
framework = arduino
lib_deps =
    johboh/nlohmann-json@^3.12.0
    paulstoffregen/OneWire@2.3.7
    adafruit/DHT sensor library@^1.4.6
    adafruit/Adafruit Unified Sensor@^1.1.15
    adafruit/Adafruit BME280 Library@^2.3.0
;    DallasTemperature
monitor_filters =
    esp32_exception_decoder
build_flags =
    -std=gnu++17
    -DESP32_BOARD=1
    -DESP32_WROOM_BOARD_TYPE=1
    -DLOGGING_LEVEL=3
    -DDISABLE_WAKE_UP_RF_NOTIFICATION=1 ; macro disabling wake up rf notifications that are annoying during software development
build_unflags = -std=gnu++11
extra_scripts = pre:get_env.py

[env:esp32-s3]
platform = espressif32
board = esp32-s3-devkitm-1
upload_speed = 921600
monitor_speed = 115200
framework = arduino
lib_deps =
    johboh/nlohmann-json@^3.12.0
    paulstoffregen/OneWire@2.3.7
    adafruit/DHT sensor library@^1.4.6
    adafruit/Adafruit Unified Sensor@^1.1.15
    adafruit/Adafruit BME280 Library@^2.3.0
;    DallasTemperature
monitor_filters =
    esp32_exception_decoder
build_flags =
    -std=gnu++17
    -DESP32_BOARD=1
    -DESP32_S3_BOARD_TYPE=1
    -DLOGGING_LEVEL=3
    -DDISABLE_WAKE_UP_RF_NOTIFICATION=1 ; macro disabling wake up rf notifications that are annoying during software development
build_unflags = -std=gnu++11
extra_scripts = pre:get_env.py


